<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM 房间属性云端同步系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0067FF; --bg-color: #F4F7F9; --sidebar-bg: #1A1C1E; --text-main: #1D1D1F; --border-color: #E5E5E7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { font-size: 18px; margin: 0 0 20px 0; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .status-bar { font-size: 12px; padding: 10px; background: #25282B; border-radius: 8px; margin-bottom: 20px; color: #FFD700; text-align: center; border: 1px solid #444; }
        .sheet-container { flex-grow: 1; overflow-y: auto; }
        .sheet-btn { width: 100%; padding: 12px; background: #2c2c2e; border: none; color: #ccc; text-align: left; margin-bottom: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .sheet-btn.active { background: var(--primary-color); color: white; font-weight: 600; }
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; }
        .top-section { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        #captureArea { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; min-height: 200px; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .data-item { background: #f8f9fb; padding: 10px; border-radius: 6px; border: 1px solid #f0f0f2; }
        .data-label { font-size: 10px; color: #86868B; display: block; margin-bottom: 4px; font-weight: 600; }
        .data-value { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .table-section { flex-grow: 1; padding: 20px 40px; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { position: sticky; top: 0; background: white; text-align: left; padding: 12px; font-size: 11px; border-bottom: 2px solid var(--border-color); z-index: 10; color: #86868B; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
        tr:hover td { background-color: #f8faff; }
        tr.selected td { background-color: #e8f3ff; color: var(--primary-color); font-weight: 600; }
        .search-box input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary-color); outline: none; box-sizing: border-box; }
        .export-btn { background: #34c759; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>BIM 数据中心</h2>
    <div id="loadStatus" class="status-bar">🔄 正在同步 Google Sheets...</div>
    <div class="sheet-container" id="sheetTabs"></div>
</div>

<div class="main-layout">
    <div class="top-section">
        <div id="captureArea">
            <h1 id="res_name" style="margin:0 0 15px 0; font-size:24px; color:var(--primary-color);">请选择房间</h1>
            <div class="info-grid" id="detailGrid">
                </div>
        </div>
        <div class="control-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="快速定位房间号..." oninput="handleSearch()">
            </div>
            <button class="export-btn" onclick="exportToImage()">📸 导出选中卡片</button>
        </div>
    </div>
    <div class="table-section">
        <table>
            <thead>
                <tr><th>楼层</th><th>房间号</th><th>名称</th><th>面积</th><th>地面做法</th><th>墙面做法</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 你的发布链接
    const GSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDaoEqhuoHOzlULSo8XFPcrlU8KzKtZC5P2xH7ZDhdLRt2z9KxFRCTvuwt-F1SNkCPbya_xb7HikF8/pub?output=csv';

    let allData = {}; 
    let currentData = [];
    let fieldMap = {};

    window.onload = () => {
        loadData();
    };

    function loadData() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', GSHEET_URL + '&t=' + new Date().getTime(), true);
        xhr.responseType = 'blob';

        xhr.onload = function() {
            if (xhr.status === 200) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = e.target.result;
                    processWorkbook(data);
                };
                reader.readAsBinaryString(xhr.response);
            } else {
                document.getElementById('loadStatus').innerText = "❌ 同步失败 (错误代码: " + xhr.status + ")";
            }
        };

        xhr.onerror = function() {
            document.getElementById('loadStatus').innerText = "❌ 网络连接异常";
        };

        xhr.send();
    }

    function processWorkbook(data) {
        // XLSX 自动处理编码，解决乱码
        const workbook = XLSX.read(data, { type: 'binary' });
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        
        if (!json || json.length === 0) return;

        // 针对你的 GSheet 表头进行映射
        const keys = Object.keys(json[0]);
        const find = (s) => keys.find(k => k.toLowerCase().replace(/[\s-_]/g,'').includes(s.toLowerCase()));
        
        fieldMap = {
            build: find('buildin') || find('楼号'),
            floor: find('floor') || find('楼层'),
            no: find('roomnumber') || find('房间号'),
            name: find('roomname') || find('房间名称'),
            area: find('area') || find('面积'),
            f_fin: find('floor') && find('做法') ? find('地面') : find('floor'),
            w_fin: find('wall'),
            skirt: find('skirt') || find('踢脚'),
            ceil: find('ceiling') || find('吊顶'),
            height: find('height') || find('高度')
        };

        const groups = {};
        json.forEach(row => {
            const bNo = row[fieldMap.build] || '113'; // 默认 fallback 到你的 113
            if (!groups[bNo]) groups[bNo] = [];
            groups[bNo].push(row);
        });

        allData = groups;
        document.getElementById('loadStatus').innerText = "✅ 云端同步成功";
        document.getElementById('loadStatus').style.color = "#00FF00";
        renderTabs();
        switchSheet(Object.keys(allData)[0]);
    }

    function renderTabs() {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = '';
        Object.keys(allData).sort().forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn'; btn.innerText = "🏢 楼栋: " + name;
            btn.onclick = () => switchSheet(name); btn.id = 'tab-' + name;
            container.appendChild(btn);
        });
    }

    function switchSheet(name) {
        currentData = allData[name];
        document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('tab-' + name)) document.getElementById('tab-' + name).classList.add('active');
        renderTable(currentData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const no = item[fieldMap.no];
            if(!no || String(item[fieldMap.name]).includes('合计')) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item[fieldMap.floor]||'-'}</td><td style="font-weight:600">${no}</td><td>${item[fieldMap.name]||'-'}</td><td>${item[fieldMap.area]||'-'}</td><td>${item[fieldMap.f_fin]||'-'}</td><td>${item[fieldMap.w_fin]||'-'}</td>`;
            tr.onclick = () => {
                document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
                tr.classList.add('selected');
                updatePanel(item);
            };
            tbody.appendChild(tr);
        });
    }

    function updatePanel(item) {
        document.getElementById('res_name').innerText = item[fieldMap.name] || '房间详情';
        const labels = { build: "楼号", floor: "楼层", no: "房间号", area: "面积(M2)", f_fin: "地面做法", w_fin: "墙面做法", skirt: "踢脚做法", ceil: "吊顶做法", height: "吊顶高度" };
        const grid = document.getElementById('detailGrid');
        grid.innerHTML = '';
        for (let key in labels) {
            grid.innerHTML += `<div class="data-item"><span class="data-label">${labels[key]}</span><span class="data-value">${item[fieldMap[key]] || '-'}</span></div>`;
        }
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        renderTable(currentData.filter(i => String(i[fieldMap.no]||'').toLowerCase().includes(val)));
    }

    function exportToImage() {
        const rNo = document.getElementById('res_no')?.innerText || 'BIM卡片';
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = `做法卡片_${rNo}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
