<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM 房间属性管理系统 - 终极版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0067FF; --bg-color: #F4F7F9; --sidebar-bg: #1A1C1E; --text-main: #1D1D1F; --text-sub: #86868B; --border-color: #E5E5E7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { font-size: 18px; margin: 0 0 20px 0; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .status-bar { font-size: 12px; padding: 12px; background: #25282B; border-radius: 8px; margin-bottom: 20px; color: #FFD700; cursor: pointer; text-align: center; border: 1px dashed #444; }
        .status-bar:hover { background: #333; border-color: var(--primary-color); }
        .sheet-container { flex-grow: 1; overflow-y: auto; }
        .sheet-btn { width: 100%; padding: 12px; background: #2c2c2e; border: none; color: #ccc; text-align: left; margin-bottom: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .sheet-btn.active { background: var(--primary-color); color: white; font-weight: 600; }
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; }
        .top-section { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        #captureArea { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .data-item { background: #f8f9fb; padding: 10px; border-radius: 6px; border: 1px solid #f0f0f2; }
        .data-label { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 4px; font-weight: 600; }
        .data-value { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .search-box input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary-color); outline: none; box-sizing: border-box; }
        .export-btn { background: #34c759; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        .table-section { flex-grow: 1; padding: 20px 40px; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { position: sticky; top: 0; background: white; text-align: left; padding: 12px; font-size: 11px; color: var(--text-sub); border-bottom: 2px solid var(--border-color); z-index: 10; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
        tr.selected td { background-color: #e8f3ff; color: var(--primary-color); font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>BIM 数据中心</h2>
    <div id="loadStatus" class="status-bar" onclick="document.getElementById('manualInput').click()">🔄 正在同步云端...<br><span style="font-size:10px; opacity:0.7">(点击此处手动上传本地文件)</span></div>
    <input type="file" id="manualInput" style="display:none" accept=".xlsx, .csv">
    <div class="sheet-container" id="sheetTabs"></div>
</div>

<div class="main-layout">
    <div class="top-section">
        <div id="captureArea">
            <h1 id="res_name" style="margin:0 0 15px 0; font-size:22px; border-bottom:2px solid var(--primary-color); display:inline-block;">请选择房间</h1>
            <div class="info-grid" id="detailGrid"></div>
        </div>
        <div class="control-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="快速搜索房间号..." oninput="handleSearch()">
            </div>
            <button class="export-btn" onclick="exportToImage()">📸 导出选中做法卡片</button>
        </div>
    </div>
    <div class="table-section">
        <table id="dataTable">
            <thead><tr id="tableHead"><th>楼层</th><th>房间号</th><th>名称</th><th>面积</th><th>地面做法</th><th>墙面做法</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 自动抓取你提供的 CSV 链接
    const GSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDaoEqhuoHOzlULSo8XFPcrlU8KzKtZC5P2xH7ZDhdLRt2z9KxFRCTvuwt-F1SNkCPbya_xb7HikF8/pub?output=csv';

    let allDataGroups = {}; 
    let currentSheetData = [];
    let fieldMap = {};

    window.onload = () => { fetchCloudData(); };

    // 自动识别表头 (解决 101/101a 不合并的关键)
    function parseData(data, isBinary = false) {
        try {
            const workbook = XLSX.read(data, { type: isBinary ? 'array' : 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            if (json.length === 0) return;

            // 智能找列名
            const keys = Object.keys(json[0]);
            const find = (s) => keys.find(k => k.toLowerCase().replace(/[\s-_]/g,'').includes(s));
            
            fieldMap = {
                build: find('buildin') || find('楼号'),
                floor: find('floor') || find('楼层'),
                no: find('roomnumber') || find('房间号'),
                name: find('roomname') || find('房间名称'),
                area: find('area') || find('面积'),
                f_fin: find('floor') && find('做法') ? find('地面') : find('floor'),
                w_fin: find('wall'),
                skirt: find('skirt') || find('踢脚'),
                ceil: find('ceiling') || find('吊顶'),
                height: find('height') || find('高度')
            };

            const groups = {};
            json.forEach(row => {
                const bNo = row[fieldMap.build] || '默认楼栋';
                if (!groups[bNo]) groups[bNo] = [];
                // 彻底保留原始行，确保 101 和 101a 独立
                groups[bNo].push(row);
            });

            allDataGroups = groups;
            renderTabs();
            switchSheet(Object.keys(allDataGroups)[0]);
            document.getElementById('loadStatus').innerText = "✅ 同步成功";
            document.getElementById('loadStatus').style.color = "#00FF00";
        } catch (e) {
            document.getElementById('loadStatus').innerText = "❌ 解析失败，请手动上传";
        }
    }

    function fetchCloudData() {
        fetch(GSHEET_CSV_URL + '&cache=' + Date.now())
            .then(res => res.text())
            .then(csv => parseData(csv))
            .catch(() => {
                document.getElementById('loadStatus').innerText = "⚠️ 无法连接云端，请点此上传";
            });
    }

    document.getElementById('manualInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => parseData(new Uint8Array(ev.target.result), true);
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    function renderTabs() {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = '';
        Object.keys(allDataGroups).sort().forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn'; btn.innerText = "🏢 " + name;
            btn.onclick = () => switchSheet(name); btn.id = 'tab-' + name;
            container.appendChild(btn);
        });
    }

    function switchSheet(name) {
        currentSheetData = allDataGroups[name];
        document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('tab-' + name)) document.getElementById('tab-' + name).classList.add('active');
        renderTable(currentSheetData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const no = item[fieldMap.no];
            if(!no || String(item[fieldMap.name]).includes('合计')) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item[fieldMap.floor] || '-'}</td><td style="font-weight:600">${no}</td><td>${item[fieldMap.name] || '-'}</td><td>${item[fieldMap.area] || '-'}</td><td>${item[fieldMap.f_fin] || '-'}</td><td>${item[fieldMap.w_fin] || '-'}</td>`;
            tr.onclick = () => {
                document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
                tr.classList.add('selected');
                updatePanel(item);
            };
            tbody.appendChild(tr);
        });
    }

    function updatePanel(item) {
        document.getElementById('res_name').innerText = item[fieldMap.name] || '请选择房间';
        const labels = { build: "楼号", floor: "楼层", no: "房间号", area: "面积(M2)", f_fin: "地面做法", w_fin: "墙面做法", skirt: "踢脚做法", ceil: "吊顶做法", height: "吊顶高度" };
        const grid = document.getElementById('detailGrid');
        grid.innerHTML = '';
        for (let key in labels) {
            grid.innerHTML += `<div class="data-item"><span class="data-label">${labels[key]}</span><span class="data-value">${item[fieldMap[key]] || '-'}</span></div>`;
        }
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = currentSheetData.filter(i => String(i[fieldMap.no] || '').toLowerCase().includes(val));
        renderTable(filtered);
    }

    function exportToImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = `BIM卡片_${document.getElementById('res_no')?.innerText || Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
